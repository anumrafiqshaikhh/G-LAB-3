<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Button Lab</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Interactive Button Demo</h1>
</header>

<main>
    <button id="actionBtn" aria-label="Perform action">Click Me</button>

    <div id="status" aria-live="polite">
        Waiting for action...
    </div>
</main>

<script src="script.js"></script>

</body>
</html>
